<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f1115">
  <title>Second Brain</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="78" font-size="80">🧠</text></svg>'>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Auth screen -->
  <section id="auth-screen" class="auth-screen hidden">
    <div class="auth-card">
      <h1>Second Brain</h1>
      <p id="auth-prompt" class="auth-prompt">Enter password</p>
      <form id="auth-form" autocomplete="off">
        <input
          type="password"
          id="auth-password"
          placeholder="Password"
          minlength="6"
          required
          autocomplete="current-password">
        <button type="submit" id="auth-submit">Continue</button>
      </form>
      <div id="auth-error" class="auth-error" role="alert"></div>
    </div>
  </section>

  <!-- Main chat view -->
  <section id="app" class="app hidden">
    <header class="topbar">
      <h1>Second Brain <span id="offline-badge" class="offline-badge hidden">📵 offline</span></h1>
      <div class="topbar-actions">
        <button id="search-btn" class="icon-btn" title="Search" aria-label="Search">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button id="browse-btn" class="icon-btn" title="Browse notes" aria-label="Browse notes">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>
        <button id="import-btn" class="icon-btn" title="Import chats" aria-label="Import chats">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </button>
        <button id="settings-btn" class="icon-btn" title="Settings" aria-label="Settings">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <button id="logout-btn" class="icon-btn" title="Log out" aria-label="Log out">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </header>
    <main id="messages" class="messages" aria-live="polite"></main>

    <!-- Search overlay -->
    <div id="search-overlay" class="import-overlay hidden" role="dialog" aria-label="Search">
      <div class="import-panel search-panel">
        <header class="import-header">
          <h2>Search your second brain</h2>
          <button id="search-close" class="icon-btn" title="Close" aria-label="Close">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </header>

        <div class="search-controls">
          <input
            type="search"
            id="search-input"
            class="search-input"
            placeholder="Search notes, conversations, ideas…"
            autocomplete="off"
            spellcheck="false">
          <div class="search-filters">
            <select id="search-type" class="filter-select">
              <option value="">Any type</option>
              <option value="journal">journal</option>
              <option value="idea">idea</option>
              <option value="reference">reference</option>
              <option value="task">task</option>
              <option value="chat">chat</option>
              <option value="voice">voice</option>
              <option value="image">image</option>
            </select>
            <select id="search-source" class="filter-select">
              <option value="">Any source</option>
              <option value="pwa">pwa</option>
              <option value="chatgpt">chatgpt</option>
              <option value="claude">claude</option>
              <option value="gemini">gemini</option>
            </select>
          </div>
        </div>

        <div id="search-status" class="search-status muted"></div>
        <ul id="search-results" class="search-results" role="list"></ul>
      </div>
    </div>

    <!-- Browse overlay -->
    <div id="browse-overlay" class="import-overlay hidden" role="dialog" aria-label="Browse">
      <div class="import-panel search-panel">
        <header class="import-header">
          <h2>Browse notes</h2>
          <button id="browse-close" class="icon-btn" title="Close" aria-label="Close">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </header>

        <div class="search-controls">
          <div class="search-filters">
            <select id="browse-type" class="filter-select">
              <option value="">Any type</option>
              <option value="journal">journal</option>
              <option value="idea">idea</option>
              <option value="reference">reference</option>
              <option value="task">task</option>
              <option value="chat">chat</option>
              <option value="voice">voice</option>
              <option value="image">image</option>
            </select>
            <select id="browse-source" class="filter-select">
              <option value="">Any source</option>
              <option value="pwa">pwa</option>
              <option value="chatgpt">chatgpt</option>
              <option value="claude">claude</option>
              <option value="gemini">gemini</option>
            </select>
            <select id="browse-tag" class="filter-select">
              <option value="">Any tag</option>
            </select>
            <button id="browse-reset" class="icon-btn" title="Reset filters" aria-label="Reset filters">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><polyline points="3 4 3 9 8 9"/></svg>
            </button>
          </div>
        </div>

        <div id="browse-status" class="search-status muted"></div>
        <ul id="browse-results" class="search-results" role="list"></ul>
        <button id="browse-more" class="primary-btn hidden" type="button">Load more</button>
      </div>
    </div>

    <!-- Settings overlay -->
    <div id="settings-overlay" class="import-overlay hidden" role="dialog" aria-label="Settings">
      <div class="import-panel">
        <header class="import-header">
          <h2>Settings</h2>
          <button id="settings-close" class="icon-btn" title="Close" aria-label="Close">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </header>

        <form id="settings-form" class="import-form">
          <label class="field">
            <span class="field-label">Active provider</span>
            <select id="set-active-provider">
              <option value="openai">OpenAI</option>
              <option value="anthropic">Anthropic (Claude)</option>
              <option value="google">Google (Gemini)</option>
            </select>
          </label>

          <fieldset class="provider-block">
            <legend>OpenAI <span id="set-openai-status" class="set-status"></span></legend>
            <label class="field">
              <span class="field-label">Model</span>
              <input type="text" id="set-openai-model" placeholder="gpt-4o-mini">
            </label>
            <label class="field">
              <span class="field-label">API key (leave blank to keep existing)</span>
              <input type="password" id="set-openai-key" autocomplete="off" placeholder="sk-…">
            </label>
          </fieldset>

          <fieldset class="provider-block">
            <legend>Anthropic <span id="set-anthropic-status" class="set-status"></span></legend>
            <label class="field">
              <span class="field-label">Model</span>
              <input type="text" id="set-anthropic-model" placeholder="claude-sonnet-4-20250514">
            </label>
            <label class="field">
              <span class="field-label">API key (leave blank to keep existing)</span>
              <input type="password" id="set-anthropic-key" autocomplete="off" placeholder="sk-ant-…">
            </label>
          </fieldset>

          <fieldset class="provider-block">
            <legend>Google <span id="set-google-status" class="set-status"></span></legend>
            <label class="field">
              <span class="field-label">Model</span>
              <input type="text" id="set-google-model" placeholder="gemini-2.0-flash">
            </label>
            <label class="field">
              <span class="field-label">API key (leave blank to keep existing)</span>
              <input type="password" id="set-google-key" autocomplete="off" placeholder="AI…">
            </label>
          </fieldset>

          <label class="field">
            <span class="field-label">Vault name (used for obsidian:// links)</span>
            <input type="text" id="set-vault-name" placeholder="MySecondBrain">
          </label>

          <div id="settings-status" class="search-status muted"></div>
          <button type="submit" id="settings-save" class="primary-btn">Save</button>
        </form>
      </div>
    </div>

    <!-- Import overlay -->
    <div id="import-overlay" class="import-overlay hidden" role="dialog" aria-label="Import chats">
      <div class="import-panel">
        <header class="import-header">
          <h2>Import chat history</h2>
          <button id="import-close" class="icon-btn" title="Close" aria-label="Close">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </header>

        <form id="import-form" class="import-form">
          <label class="field">
            <span class="field-label">Source</span>
            <select id="import-source">
              <option value="chatgpt">ChatGPT  (conversations.json / .zip)</option>
              <option value="claude">Claude  (claude_chat.zip / conversations.json)</option>
              <option value="gemini">Gemini  (Takeout .zip / My Activity .html / .json)</option>
            </select>
          </label>

          <label class="field">
            <span class="field-label">Export file</span>
            <input type="file" id="import-file" accept=".zip,.json,.html,.htm,application/zip,application/json,text/html" required>
          </label>

          <label class="field-inline">
            <input type="checkbox" id="import-process" checked>
            <span>Process with LLM (adds tags &amp; 1-line summary — slower)</span>
          </label>

          <label class="field">
            <span class="field-label">Limit (optional — useful for testing first)</span>
            <input type="number" id="import-limit" min="1" placeholder="e.g. 10">
          </label>

          <button type="submit" id="import-submit" class="primary-btn">Start import</button>
        </form>

        <section id="import-progress" class="import-progress hidden">
          <div class="progress-bar"><div id="progress-bar-fill" class="progress-bar-fill"></div></div>
          <div class="progress-stats">
            <span><span id="progress-index">0</span> / <span id="progress-total">0</span></span>
            <span class="muted">imported <b id="progress-imported">0</b></span>
            <span class="muted">skipped <b id="progress-skipped">0</b></span>
            <span class="muted">failed <b id="progress-failed">0</b></span>
          </div>
          <div id="progress-current" class="progress-current muted"></div>
          <div id="progress-error" class="auth-error" role="alert"></div>
        </section>
      </div>
    </div>

    <input type="file" id="image-input" accept="image/*" hidden>

    <footer class="composer">
      <button id="attach-btn" class="composer-btn" title="Attach image" aria-label="Attach image">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
      </button>
      <button id="mic-btn" class="composer-btn" title="Record voice" aria-label="Record voice">
        <svg class="mic-idle" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        <svg class="mic-recording" viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
      </button>
      <textarea
        id="input"
        placeholder="Capture a thought…"
        rows="1"
        autocomplete="off"
        spellcheck="true"></textarea>
      <button id="send-btn" class="send-btn" title="Send" aria-label="Send">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </footer>
  </section>

  <script src="/js/app.js"></script>
</body>
</html>
